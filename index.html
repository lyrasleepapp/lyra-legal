<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Legal – Lyra Sleep App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0d0d1a;
      color: #e8e4f8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }
    .card { text-align: center; max-width: 400px; }
    .logo { font-size: 2.5rem; margin-bottom: 1rem; }
    h1 { font-size: 1.5rem; font-weight: 800; color: #fff; margin-bottom: .5rem; }
    p { color: #9990c4; margin-bottom: 2rem; font-size: .95rem; }
    .links { display: flex; flex-direction: column; gap: 1rem; }
    a {
      display: block;
      background: #13132a;
      border: 1px solid #2a2a4a;
      border-radius: 12px;
      padding: 1.1rem 1.5rem;
      color: #a78bfa;
      text-decoration: none;
      font-weight: 600;
      transition: border-color .2s;
    }
    a:hover { border-color: #a78bfa; }
    a span { display: block; font-size: .8rem; color: #6b6490; font-weight: 400; margin-top: .2rem; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">🌙</div>
    <h1>Lyra Sleep App</h1>
    <p>Legal documents for the Lyra app.</p>
    <div class="links">
      <a href="privacy.html">
        Privacy Policy
        <span>How we collect, use, and protect your data</span>
      </a>
      <a href="terms.html">
        Terms of Service
        <span>Rules and agreements for using Lyra</span>
      </a>
    </div>
  </div>
</body>
</html>
